<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaLink Vault Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            background-color: #050507;
            color: white;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050507; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root">
        <!-- Initial Loader -->
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
            <div class="loader"></div>
            <p style="margin-top: 1.5rem; color: #475569; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase;">Mendekripsi Vault...</p>
        </div>
    </div>

    <script>
        const e = React.createElement;
        const { useState, useEffect } = React;

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [inputPassword, setInputPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            
            // Form State
            const [formData, setFormData] = useState({ title: '', url: '', category: 'UMUM', description: '' });

            // Data State (LocalStorage)
            const [links, setLinks] = useState(() => {
                const saved = localStorage.getItem('metalink_data');
                return saved ? JSON.parse(saved) : [
                    { id: '1', title: 'Google Search', url: 'https://google.com', category: 'UMUM', description: 'Mesin pencari utama.' },
                    { id: '2', title: 'GitHub Profile', url: 'https://github.com', category: 'KERJA', description: 'Repositori kode personal.' }
                ];
            });

            // Auto-save to LocalStorage
            useEffect(() => {
                localStorage.setItem('metalink_data', JSON.stringify(links));
            }, [links]);

            // Refresh Icons
            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [isAuthenticated, links, isModalOpen, searchQuery]);

            const handleLogin = (ev) => {
                ev.preventDefault();
                if (inputPassword === "admin") {
                    setIsAuthenticated(true);
                } else {
                    setLoginError("Akses Ditolak: Kunci Salah");
                    setTimeout(() => setLoginError(""), 3000);
                }
            };

            const handleSubmit = (ev) => {
                ev.preventDefault();
                if (editingId) {
                    setLinks(links.map(l => l.id === editingId ? { ...formData, id: editingId } : l));
                } else {
                    setLinks([...links, { ...formData, id: Date.now().toString() }]);
                }
                resetForm();
            };

            const resetForm = () => {
                setFormData({ title: '', url: '', category: 'UMUM', description: '' });
                setEditingId(null);
                setIsModalOpen(false);
            };

            const deleteLink = (id) => {
                if(confirm("Hapus aset digital ini?")) {
                    setLinks(links.filter(l => l.id !== id));
                }
            };

            const filteredLinks = links.filter(l => 
                l.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                l.category.toLowerCase().includes(searchQuery.toLowerCase())
            );

            // 1. Tampilan Login
            if (!isAuthenticated) {
                return e('div', { className: "min-h-screen flex items-center justify-center p-6 bg-[#050507]" },
                    e('div', { className: "w-full max-w-sm text-center" },
                        e('div', { className: "mx-auto w-24 h-24 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[2.5rem] flex items-center justify-center mb-8 shadow-2xl shadow-blue-600/30" }, 
                            e('i', { 'data-lucide': "lock", className: "text-white", style: { width: '40px', height: '40px' } })
                        ),
                        e('h1', { className: "text-3xl font-black italic uppercase tracking-tighter mb-2" }, "Vault Lock"),
                        e('p', { className: "text-slate-500 text-xs mb-8 font-bold uppercase tracking-[0.3em]" }, "AES-256 Client Verification"),
                        e('form', { onSubmit: handleLogin, className: "space-y-4" },
                            e('div', { className: "relative" },
                                e('i', { 'data-lucide': "key", className: "absolute left-4 top-1/2 -translate-y-1/2 text-slate-600", style: { width: '18px', height: '18px' } }),
                                e('input', { 
                                    type: "password", 
                                    placeholder: "MASTER PASSWORD",
                                    value: inputPassword,
                                    onChange: (ev) => setInputPassword(ev.target.value),
                                    className: "w-full pl-12 pr-6 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-blue-500 text-center tracking-widest text-white transition-all"
                                })
                            ),
                            loginError && e('p', { className: "text-rose-500 text-[10px] font-black uppercase animate-pulse" }, loginError),
                            e('button', { type: "submit", className: "w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black uppercase text-xs tracking-widest transition-all shadow-lg shadow-blue-600/20 active:scale-95 flex items-center justify-center gap-2" }, 
                                e('i', { 'data-lucide': "shield-check", style: { width: '16px', height: '16px' } }),
                                "Buka Vault"
                            )
                        )
                    )
                );
            }

            // 2. Tampilan Dashboard Utama
            return e('div', { className: "min-h-screen p-6 md:p-12 max-w-7xl mx-auto" },
                // Header
                e('header', { className: "flex flex-col md:flex-row md:items-center justify-between gap-8 mb-16" },
                    e('div', { className: "flex items-center gap-5" },
                        e('div', { className: "w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-600/20" }, 
                            e('i', { 'data-lucide': "box", className: "text-white" })
                        ),
                        e('div', null,
                            e('h1', { className: "text-2xl font-black tracking-tighter uppercase italic" }, "MetaLink Vault"),
                            e('div', { className: "flex items-center gap-2" },
                                e('span', { className: "w-2 h-2 bg-emerald-500 rounded-full animate-pulse" }),
                                e('span', { className: "text-[10px] font-bold text-slate-500 tracking-widest uppercase" }, "Status: Terenkripsi")
                            )
                        )
                    ),
                    e('div', { className: "flex items-center gap-4" },
                        e('div', { className: "relative hidden sm:block" },
                            e('i', { 'data-lucide': "search", className: "absolute left-4 top-1/2 -translate-y-1/2 text-slate-500", style: { width: '16px', height: '16px' } }),
                            e('input', { 
                                type: "text", 
                                placeholder: "Cari aset...", 
                                value: searchQuery,
                                onChange: (ev) => setSearchQuery(ev.target.value),
                                className: "bg-white/5 border border-white/10 rounded-2xl pl-12 pr-6 py-3 text-sm outline-none focus:border-blue-500/50 w-64 transition-all"
                            })
                        ),
                        e('button', { 
                            onClick: () => setIsAuthenticated(false),
                            className: "p-3 bg-white/5 border border-white/10 rounded-2xl text-slate-400 hover:text-rose-500 hover:border-rose-500/30 transition-all"
                        }, e('i', { 'data-lucide': "log-out", style: { width: '20px', height: '20px' } }))
                    )
                ),

                // Hero Action
                e('div', { className: "flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12" },
                    e('div', null,
                        e('h2', { className: "text-5xl font-black tracking-tighter uppercase italic mb-2" }, "Dashboard"),
                        e('p', { className: "text-slate-500 font-medium" }, `Terdapat `, e('span', { className: "text-blue-500 font-bold" }, filteredLinks.length), ` aset digital tersimpan dalam vault.`)
                    ),
                    e('button', { 
                        onClick: () => { resetForm(); setIsModalOpen(true); },
                        className: "px-8 py-4 bg-white text-black hover:bg-blue-600 hover:text-white rounded-2xl font-black text-xs tracking-widest flex items-center justify-center gap-2 transition-all shadow-xl active:scale-95"
                    }, e('i', { 'data-lucide': "plus", style: { width: '18px', height: '18px' } }), "TAMBAH ASET")
                ),

                // Grid Data
                filteredLinks.length === 0 ? 
                    e('div', { className: "py-32 border-2 border-dashed border-white/5 rounded-[40px] text-center" },
                        e('i', { 'data-lucide': "folder-open", className: "mx-auto text-slate-800 mb-4", style: { width: '48px', height: '48px' } }),
                        e('p', { className: "text-slate-600 font-bold uppercase tracking-widest text-sm" }, "Tidak ada aset ditemukan")
                    ) :
                    e('div', { className: "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" },
                        filteredLinks.map(link => e('div', { key: link.id, className: "glass-card p-8 rounded-[32px] group relative overflow-hidden hover:border-blue-500/50 transition-all" },
                            e('div', { className: "flex justify-between items-start mb-8" },
                                e('div', { className: "w-14 h-14 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-500 font-black text-2xl" }, link.title.charAt(0)),
                                e('div', { className: "flex gap-1 opacity-0 group-hover:opacity-100 transition-all" },
                                    e('button', { onClick: () => { setFormData(link); setEditingId(link.id); setIsModalOpen(true); }, className: "p-2 hover:bg-white/5 rounded-lg text-slate-400" }, e('i', { 'data-lucide': "pencil", style: { width: '16px', height: '16px' } })),
                                    e('button', { onClick: () => deleteLink(link.id), className: "p-2 hover:bg-rose-500/10 rounded-lg text-rose-500" }, e('i', { 'data-lucide': "trash-2", style: { width: '16px', height: '16px' } }))
                                )
                            ),
                            e('div', { className: "mb-6" },
                                e('p', { className: "text-[10px] text-blue-500 font-bold uppercase tracking-widest mb-1" }, link.category),
                                e('h3', { className: "text-xl font-bold truncate group-hover:text-blue-400 transition-colors" }, link.title),
                                e('p', { className: "text-slate-500 text-sm italic mt-2 line-clamp-2 min-h-[40px]" }, link.description || "Tanpa deskripsi aset.")
                            ),
                            e('a', { 
                                href: link.url.startsWith('http') ? link.url : `https://${link.url}`, 
                                target: "_blank",
                                className: "w-full py-4 bg-white/5 group-hover:bg-blue-600 rounded-2xl flex items-center justify-center gap-2 text-xs font-black transition-all"
                            }, "AKSES LINK ", e('i', { 'data-lucide': "external-link", style: { width: '14px', height: '14px' } }))
                        ))
                    ),

                // Modal Form
                isModalOpen && e('div', { className: "fixed inset-0 z-50 bg-black/90 backdrop-blur-md flex items-center justify-center p-4" },
                    e('div', { className: "bg-[#0d0d12] w-full max-w-lg rounded-[40px] border border-white/10 p-10 relative overflow-hidden shadow-2xl" },
                        e('div', { className: "absolute top-0 left-0 w-full h-1 bg-blue-600" }),
                        e('div', { className: "flex justify-between items-center mb-10" },
                            e('h2', { className: "text-2xl font-black tracking-tighter uppercase" }, editingId ? "Edit Aset" : "Aset Baru"),
                            e('button', { onClick: resetForm, className: "text-slate-500 hover:text-white" }, e('i', { 'data-lucide': "x" }))
                        ),
                        e('form', { onSubmit: handleSubmit, className: "space-y-6" },
                            e('div', null,
                                e('label', { className: "text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2" }, "Nama Aset"),
                                e('input', { required: true, value: formData.title, onChange: ev => setFormData({...formData, title: ev.target.value}), className: "w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-blue-500/50" })
                            ),
                            e('div', null,
                                e('label', { className: "text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2" }, "URL / Tautan"),
                                e('input', { required: true, value: formData.url, onChange: ev => setFormData({...formData, url: ev.target.value}), className: "w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-blue-500/50" })
                            ),
                            e('div', { className: "grid grid-cols-2 gap-4" },
                                e('div', null,
                                    e('label', { className: "text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2" }, "Kategori"),
                                    e('select', { value: formData.category, onChange: ev => setFormData({...formData, category: ev.target.value}), className: "w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none appearance-none" },
                                        e('option', { className: "bg-[#0d0d12]" }, "UMUM"),
                                        e('option', { className: "bg-[#0d0d12]" }, "KERJA"),
                                        e('option', { className: "bg-[#0d0d12]" }, "HIBURAN"),
                                        e('option', { className: "bg-[#0d0d12]" }, "BELAJAR")
                                    )
                                ),
                                e('div', null,
                                    e('label', { className: "text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2" }, "Keamanan"),
                                    e('div', { className: "w-full bg-emerald-500/5 border border-emerald-500/20 rounded-2xl p-4 text-emerald-500 text-[10px] font-black uppercase flex items-center gap-2" }, e('i', { 'data-lucide': "shield", style: { width: '12px' } }), "Terenkripsi")
                                )
                            ),
                            e('button', { type: "submit", className: "w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-xs tracking-widest transition-all mt-4" }, "SIMPAN PERUBAHAN")
                        )
                    )
                )
            );
        };

        window.onload = () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(e(App));
        };
    </script>
</body>
</html>
