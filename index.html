<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaLink Vault</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050507; }
        #root { min-height: 100vh; }
    </style>
</head>
<body class="bg-[#050507]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Konfigurasi Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
          ? JSON.parse(__firebase_config) 
          : {
              apiKey: "", 
              authDomain: "sarpras-846ad.firebaseapp.com",
              projectId: "sarpras-846ad",
              storageBucket: "sarpras-846ad.firebasestorage.app",
              messagingSenderId: "1048448341234",
              appId: "1:1048448341234:web:ab89ef5455222b9ed36c6b"
            };

        // Inisialisasi Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'metalink-v1';

        const VAULT_PASSWORD = "admin"; 

        // Ikon SVG Manual untuk memastikan tidak ada layar hitam jika library eksternal gagal
        const LockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const ShieldIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>;
        const TrashIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const LogoutIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
        const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>;
        const CloseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>;

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [links, setLinks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ title: '', url: '', description: '' });
            const [inputPassword, setInputPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth error:", err);
                    }
                };
                initAuth();
                
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !isAuthenticated) return;
                
                setLoading(true);
                const path = `artifacts/${appId}/users/${user.uid}/links`;
                const unsubscribe = db.collection(path).onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setLinks(data);
                    setLoading(false);
                }, (err) => {
                    console.error("Firestore error:", err);
                    setLoading(false);
                });
                
                return () => unsubscribe();
            }, [user, isAuthenticated]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (inputPassword === VAULT_PASSWORD) {
                    setIsAuthenticated(true);
                    setLoginError('');
                } else {
                    setLoginError('Kata sandi salah!');
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) return;
                
                const id = Date.now().toString();
                const path = `artifacts/${appId}/users/${user.uid}/links`;
                
                try {
                    await db.collection(path).doc(id).set({
                        ...formData,
                        updatedAt: new Date().toISOString()
                    });
                    setFormData({ title: '', url: '', description: '' });
                    setIsModalOpen(false);
                } catch (err) {
                    console.error("Save error:", err);
                }
            };

            const handleDelete = async (id) => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}/links`;
                try {
                    await db.collection(path).doc(id).delete();
                } catch (err) {
                    console.error("Delete error:", err);
                }
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 text-white bg-[#050507]">
                        <div className="w-full max-w-sm space-y-8 text-center">
                            <div className="mx-auto w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center shadow-2xl shadow-blue-600/20">
                                <LockIcon />
                            </div>
                            <div>
                                <h1 className="text-3xl font-black italic uppercase tracking-tighter">Vault Lock</h1>
                                <p className="text-slate-500 text-sm mt-2">Masukkan kunci akses untuk melanjutkan</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    type="password" 
                                    placeholder="Masukkan Password..." 
                                    value={inputPassword}
                                    onChange={(e) => setInputPassword(e.target.value)}
                                    className="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-blue-500 transition-all text-center tracking-widest text-white"
                                />
                                {loginError && <p className="text-rose-500 text-xs font-bold animate-pulse">{loginError}</p>}
                                <button type="submit" className="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl font-black uppercase tracking-widest transition-all">
                                    Buka Vault
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-slate-200 p-4 md:p-8 bg-[#050507]">
                    <header className="max-w-6xl mx-auto flex justify-between items-center mb-12">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                                <ShieldIcon />
                            </div>
                            <h1 className="text-xl font-black text-white italic tracking-tighter">METALINK</h1>
                        </div>
                        <button onClick={() => setIsAuthenticated(false)} className="p-3 bg-white/5 rounded-xl text-slate-400 hover:text-rose-500 transition-all flex items-center gap-2">
                            <span className="hidden sm:inline text-xs font-bold uppercase tracking-widest">Logout</span>
                            <LogoutIcon />
                        </button>
                    </header>

                    <main className="max-w-6xl mx-auto">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-4">
                            <div>
                                <h2 className="text-4xl font-black text-white italic uppercase tracking-tighter">Dashboard</h2>
                                <p className="text-slate-500 text-sm italic">Kelola aset tautan digital terenkripsi Anda secara aman.</p>
                            </div>
                            <button onClick={() => setIsModalOpen(true)} className="w-full md:w-auto bg-white text-black px-8 py-3 rounded-xl font-bold hover:bg-blue-600 hover:text-white transition-all shadow-xl shadow-white/5 flex items-center justify-center gap-2">
                                <PlusIcon /> TAMBAH LINK
                            </button>
                        </div>

                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-20 space-y-4">
                                <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                                <p className="text-slate-500 font-bold text-xs uppercase tracking-widest">Mengambil Data...</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {links.length === 0 && (
                                    <div className="col-span-full border-2 border-dashed border-white/5 rounded-3xl p-12 text-center text-slate-600 italic">
                                        Belum ada link yang tersimpan di vault ini.
                                    </div>
                                )}
                                {links.map(link => (
                                    <div key={link.id} className="bg-white/5 border border-white/10 p-6 rounded-[2.5rem] hover:border-blue-500 transition-all group overflow-hidden relative">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="w-12 h-12 bg-blue-600/20 rounded-2xl flex items-center justify-center text-blue-500 font-black text-xl border border-blue-500/20">
                                                {link.title ? link.title.charAt(0).toUpperCase() : '?'}
                                            </div>
                                            <button 
                                                onClick={() => handleDelete(link.id)}
                                                className="p-2 text-slate-500 hover:text-rose-500 bg-white/5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity"
                                            >
                                                <TrashIcon />
                                            </button>
                                        </div>
                                        <h3 className="text-xl font-bold text-white mb-2 group-hover:text-blue-400 transition-colors">{link.title}</h3>
                                        <p className="text-sm text-slate-500 mb-6 h-10 italic line-clamp-2 leading-relaxed">
                                            {link.description || "Tidak ada deskripsi tersedia."}
                                        </p>
                                        <a href={link.url} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-2 w-full py-4 bg-white/5 group-hover:bg-blue-600 rounded-2xl text-[10px] font-black tracking-widest transition-all">
                                            BUKA TAUTAN
                                        </a>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-[#0d0d12] w-full max-w-md rounded-[2.5rem] p-8 border border-white/10 shadow-2xl">
                                <div className="flex justify-between items-center mb-8 text-white">
                                    <h2 className="text-2xl font-black italic uppercase tracking-tighter">Tambah Tautan</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-500 hover:text-white transition-colors">
                                        <CloseIcon />
                                    </button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-5">
                                    <div className="space-y-1">
                                        <label className="text-[10px] uppercase font-black text-slate-500 tracking-widest ml-2">Label Link</label>
                                        <input required placeholder="Nama Tautan" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:border-blue-500 outline-none transition-all" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] uppercase font-black text-slate-500 tracking-widest ml-2">Alamat URL</label>
                                        <input required placeholder="https://..." className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:border-blue-500 outline-none transition-all" value={formData.url} onChange={e => setFormData({...formData, url: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] uppercase font-black text-slate-500 tracking-widest ml-2">Deskripsi</label>
                                        <textarea placeholder="Keterangan singkat..." className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white h-24 focus:border-blue-500 outline-none transition-all resize-none" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} />
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button type="submit" className="flex-1 py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl font-black text-white tracking-widest text-xs uppercase transition-all shadow-lg shadow-blue-600/20">SIMPAN ASET</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Render aplikasi ke root element
        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
</body>
</html>
