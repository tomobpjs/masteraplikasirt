<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link App RT - Cloud Sync</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            background-color: #050507;
            color: white;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.4);
            background: rgba(255, 255, 255, 0.04);
        }

        .loader-spin {
            border: 3px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;

        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
  apiKey: "AIzaSyCc78gnniFFa-wCaP5-Febi8FpJgAEZKss",
  authDomain: "sarpras-846ad.firebaseapp.com",
  projectId: "sarpras-846ad",
  storageBucket: "sarpras-846ad.firebasestorage.app",
  messagingSenderId: "1048448341234",
  appId: "1:1048448341234:web:ab89ef5455222b9ed36c6b",
  measurementId: "G-2DPVT5MLE5"
};

        // Inisialisasi Firebase (Compat Mode)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'metalink-vault-v2';

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [links, setLinks] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ title: '', url: '', category: 'UMUM', description: '' });

            // 1. Inisialisasi Auth Anonim (Cloud Support)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        // Coba sign in secara anonim agar mendukung cloud tanpa login manual
                        await auth.signInAnonymously();
                    } catch (err) {
                        console.error("Gagal inisialisasi cloud session:", err);
                    }
                };
                
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((currUser) => {
                    setUser(currUser);
                    if (!currUser) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // 2. Sinkronisasi Real-time dengan Firestore
            useEffect(() => {
                if (!user) return;

                const colPath = `artifacts/${appId}/users/${user.uid}/links`;
                const unsubscribe = db.collection(colPath).onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setLinks(data);
                    setLoading(false);
                    // Refresh icons after data loads
                    setTimeout(() => window.lucide && lucide.createIcons(), 100);
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            // Refresh icons on UI changes
            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [links, isModalOpen, searchQuery]);

            const handleSubmit = async (ev) => {
                ev.preventDefault();
                if (!user) return;

                const id = editingId || Date.now().toString();
                const colPath = `artifacts/${appId}/users/${user.uid}/links`;
                
                try {
                    await db.collection(colPath).doc(id).set({
                        ...formData,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    resetForm();
                } catch (err) {
                    alert("Gagal menyimpan ke cloud: " + err.message);
                }
            };

            const deleteLink = async (id) => {
                if (!user || !confirm("Hapus aset ini dari cloud?")) return;
                const colPath = `artifacts/${appId}/users/${user.uid}/links`;
                try {
                    await db.collection(colPath).doc(id).delete();
                } catch (err) {
                    alert("Gagal menghapus: " + err.message);
                }
            };

            const resetForm = () => {
                setFormData({ title: '', url: '', category: 'UMUM', description: '' });
                setEditingId(null);
                setIsModalOpen(false);
            };

            const filteredLinks = links.filter(l => 
                l.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                l.category.toLowerCase().includes(searchQuery.toLowerCase())
            );

            if (loading) {
                return React.createElement('div', { className: "min-h-screen flex flex-col items-center justify-center bg-[#050507]" },
                    React.createElement('div', { className: "loader-spin mb-6" }),
                    React.createElement('p', { className: "text-[10px] font-black text-slate-600 uppercase tracking-[0.4em]" }, "Sinkronisasi Cloud...")
                );
            }

            return React.createElement('div', { className: "min-h-screen p-6 md:p-12 max-w-7xl mx-auto" },
                // Header
                React.createElement('header', { className: "flex flex-col md:flex-row md:items-center justify-between gap-8 mb-16" },
                    React.createElement('div', { className: "flex items-center gap-5" },
                        React.createElement('div', { className: "w-14 h-14 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-600/20 border border-white/5" }, 
                            React.createElement('i', { 'data-lucide': "database", className: "text-white" })
                        ),
                        React.createElement('div', null,
                            React.createElement('h1', { className: "text-2xl font-black tracking-tighter uppercase italic leading-none mb-1" }, "LIST APP BAG.RUMAH TANGGA"),
                            React.createElement('div', { className: "flex items-center gap-2" },
                                React.createElement('span', { className: "w-2 h-2 bg-emerald-500 rounded-full animate-pulse" }),
                                React.createElement('span', { className: "text-[9px] font-bold text-slate-500 tracking-widest uppercase" }, "Cloud Sync: Aktif")
                            )
                        )
                    ),
                    React.createElement('div', { className: "relative" },
                        React.createElement('i', { 'data-lucide': "search", className: "absolute left-4 top-1/2 -translate-y-1/2 text-slate-600", style: { width: '18px' } }),
                        React.createElement('input', { 
                            type: "text", 
                            placeholder: "Cari aset digital...", 
                            value: searchQuery,
                            onChange: (ev) => setSearchQuery(ev.target.value),
                            className: "bg-white/5 border border-white/10 rounded-2xl pl-12 pr-6 py-4 text-sm outline-none focus:border-blue-500/50 w-full md:w-80 transition-all"
                        })
                    )
                ),

                // Hero Section
                React.createElement('div', { className: "flex flex-col md:flex-row md:items-end justify-between gap-8 mb-12" },
                    React.createElement('div', null,
                        React.createElement('h2', { className: "text-6xl font-black tracking-tighter uppercase italic mb-2 text-white" }, "Dashboard"),
                        React.createElement('p', { className: "text-slate-500 text-sm font-medium" }, 
                            "Mengelola ", React.createElement('span', { className: "text-blue-500 font-bold" }, links.length), " tautan tersimpan aman di server cloud."
                        )
                    ),
                    React.createElement('button', { 
                        onClick: () => { resetForm(); setIsModalOpen(true); },
                        className: "px-10 py-5 bg-white text-black hover:bg-blue-600 hover:text-white rounded-2xl font-black text-xs tracking-widest flex items-center justify-center gap-3 transition-all shadow-2xl active:scale-95 group"
                    }, React.createElement('i', { 'data-lucide': "plus", className: "group-hover:rotate-90 transition-transform" }), "TAMBAH ASET")
                ),

                // Data Display
                filteredLinks.length === 0 ? 
                    React.createElement('div', { className: "py-32 border-2 border-dashed border-white/5 rounded-[48px] text-center bg-white/[0.01]" },
                        React.createElement('i', { 'data-lucide': "box", className: "mx-auto text-slate-800 mb-6", style: { width: '64px', height: '64px' } }),
                        React.createElement('p', { className: "text-slate-600 font-bold uppercase tracking-widest text-xs" }, "Vault Anda masih kosong")
                    ) :
                    React.createElement('div', { className: "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" },
                        filteredLinks.map(link => React.createElement('div', { key: link.id, className: "glass-card p-8 rounded-[40px] group relative overflow-hidden" },
                            React.createElement('div', { className: "flex justify-between items-start mb-8" },
                                React.createElement('div', { className: "w-14 h-14 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-500 font-black text-2xl border border-blue-500/10" }, link.title.charAt(0)),
                                React.createElement('div', { className: "flex gap-1 opacity-0 group-hover:opacity-100 transition-all translate-y-2 group-hover:translate-y-0" },
                                    React.createElement('button', { onClick: () => { setFormData(link); setEditingId(link.id); setIsModalOpen(true); }, className: "p-2.5 hover:bg-white/5 rounded-xl text-slate-400 hover:text-white" }, React.createElement('i', { 'data-lucide': "pencil", style: { width: '16px' } })),
                                    React.createElement('button', { onClick: () => deleteLink(link.id), className: "p-2.5 hover:bg-rose-500/10 rounded-xl text-rose-500" }, React.createElement('i', { 'data-lucide': "trash-2", style: { width: '16px' } }))
                                )
                            ),
                            React.createElement('div', { className: "mb-8" },
                                React.createElement('div', { className: "flex items-center gap-2 mb-2" },
                                    React.createElement('span', { className: "px-2 py-0.5 bg-blue-500/10 text-blue-500 text-[9px] font-black uppercase tracking-widest rounded-md" }, link.category)
                                ),
                                React.createElement('h3', { className: "text-2xl font-bold truncate text-slate-100 group-hover:text-blue-400 transition-colors" }, link.title),
                                React.createElement('p', { className: "text-slate-500 text-sm italic mt-2 line-clamp-2 min-h-[40px] leading-relaxed" }, link.description || "Tersimpan aman di cloud.")
                            ),
                            React.createElement('a', { 
                                href: link.url.startsWith('http') ? link.url : `https://${link.url}`, 
                                target: "_blank",
                                rel: "noopener noreferrer",
                                className: "w-full py-4 bg-white/5 group-hover:bg-blue-600 rounded-2xl flex items-center justify-center gap-2 text-[11px] font-black transition-all text-slate-400 group-hover:text-white"
                            }, "BUKA TAUTAN ", React.createElement('i', { 'data-lucide': "external-link", style: { width: '14px' } }))
                        ))
                    ),

                // Modal Form
                isModalOpen && React.createElement('div', { className: "fixed inset-0 z-50 bg-black/90 backdrop-blur-xl flex items-center justify-center p-4 animate-in fade-in duration-300" },
                    React.createElement('div', { className: "bg-[#0d0d12] w-full max-w-lg rounded-[48px] border border-white/10 p-10 relative overflow-hidden shadow-2xl animate-in zoom-in-95 duration-300" },
                        React.createElement('div', { className: "flex justify-between items-center mb-10" },
                            React.createElement('div', null,
                                React.createElement('h2', { className: "text-2xl font-black uppercase tracking-tighter italic" }, editingId ? "Update Aset" : "Simpan Aset"),
                                React.createElement('p', { className: "text-slate-500 text-[9px] font-black uppercase tracking-[0.2em] mt-1" }, "Sinkronisasi Cloud Aktif")
                            ),
                            React.createElement('button', { onClick: resetForm, className: "w-10 h-10 flex items-center justify-center bg-white/5 rounded-full text-slate-500 hover:text-white transition-colors" }, React.createElement('i', { 'data-lucide': "x" }))
                        ),
                        React.createElement('form', { onSubmit: handleSubmit, className: "space-y-6" },
                            React.createElement('div', null,
                                React.createElement('label', { className: "text-[10px] font-black text-slate-600 uppercase tracking-widest block mb-2 ml-1" }, "Nama Tautan"),
                                React.createElement('input', { required: true, value: formData.title, onChange: ev => setFormData({...formData, title: ev.target.value}), className: "w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-blue-500/50 text-sm" })
                            ),
                            React.createElement('div', null,
                                React.createElement('label', { className: "text-[10px] font-black text-slate-600 uppercase tracking-widest block mb-2 ml-1" }, "URL Tautan"),
                                React.createElement('input', { required: true, value: formData.url, onChange: ev => setFormData({...formData, url: ev.target.value}), className: "w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-blue-500/50 text-sm" })
                            ),
                            React.createElement('div', null,
                                React.createElement('label', { className: "text-[10px] font-black text-slate-600 uppercase tracking-widest block mb-2 ml-1" }, "Kategori"),
                                React.createElement('select', { value: formData.category, onChange: ev => setFormData({...formData, category: ev.target.value}), className: "w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none appearance-none text-sm cursor-pointer" },
                                    React.createElement('option', { className: "bg-[#0d0d12]" }, "UMUM"),
                                    React.createElement('option', { className: "bg-[#0d0d12]" }, "KERJA"),
                                    React.createElement('option', { className: "bg-[#0d0d12]" }, "HIBURAN"),
                                    React.createElement('option', { className: "bg-[#0d0d12]" }, "BELAJAR")
                                )
                            ),
                            React.createElement('div', null,
                                React.createElement('label', { className: "text-[10px] font-black text-slate-600 uppercase tracking-widest block mb-2 ml-1" }, "Deskripsi (Opsional)"),
                                React.createElement('textarea', { value: formData.description, onChange: ev => setFormData({...formData, description: ev.target.value}), className: "w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none h-24 resize-none text-sm" })
                            ),
                            React.createElement('button', { type: "submit", className: "w-full py-5 bg-blue-600 hover:bg-blue-500 text-white rounded-[22px] font-black text-xs tracking-[0.2em] transition-all shadow-xl shadow-blue-600/20 active:scale-95 uppercase" }, 
                                editingId ? "Update Data" : "Sinkronkan ke Cloud"
                            )
                        )
                    )
                ),

                // Footer
                React.createElement('footer', { className: "mt-24 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-4 text-slate-600" },
                    React.createElement('div', { className: "flex items-center gap-2" },
                        React.createElement('i', { 'data-lucide': "shield-check", className: "text-emerald-500", style: { width: '14px' } }),
                        React.createElement('p', { className: "text-[10px] font-black uppercase tracking-widest" }, "MetaLink Vault v2.5 • No-Login Cloud Protection")
                    ),
                    React.createElement('p', { className: "text-[9px] font-bold opacity-50 uppercase tracking-tighter" }, "© 2024 Secure Sync Protocol")
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
