<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaLink Vault</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (Production Version) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050507; 
            margin: 0;
            color: white;
            overflow-x: hidden;
        }
        #root { min-height: 100vh; }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-[#050507]">
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
            <div class="loader"></div>
            <p style="margin-top: 1.5rem; color: #64748b; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase;">Menginisialisasi Sistem...</p>
        </div>
    </div>

    <script>
        // Menggunakan Vanilla JS (Tanpa Babel) untuk memastikan kompatibilitas maksimal
        const e = React.createElement;
        const { useState, useEffect } = React;

        // Penanganan Config yang lebih aman
        let fbConfig;
        try {
            fbConfig = typeof __firebase_config !== 'undefined' 
              ? JSON.parse(__firebase_config) 
              : {
                  apiKey: "", 
                  authDomain: "sarpras-846ad.firebaseapp.com",
                  projectId: "sarpras-846ad",
                  storageBucket: "sarpras-846ad.firebasestorage.app",
                  messagingSenderId: "1048448341234",
                  appId: "1:1048448341234:web:ab89ef5455222b9ed36c6b"
                };
        } catch (err) {
            console.error("Gagal memuat konfigurasi:", err);
        }

        if (fbConfig && !firebase.apps.length) {
            firebase.initializeApp(fbConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'metalink-v1';

        // Ikon SVG Manual
        const LockIcon = () => e('svg', { width: 40, height: 40, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" }, 
            e('rect', { width: 18, height: 11, x: 3, y: 11, rx: 2, ry: 2 }),
            e('path', { d: "M7 11V7a5 5 0 0 1 10 0v4" })
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [links, setLinks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [inputPassword, setInputPassword] = useState('');
            const [error, setError] = useState('');

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) { console.error("Auth error:", err); }
                };
                initAuth();
                return auth.onAuthStateChanged(setUser);
            }, []);

            const handleLogin = (ev) => {
                ev.preventDefault();
                if (inputPassword === "admin") {
                    setIsAuthenticated(true);
                } else {
                    setError("Akses Ditolak");
                }
            };

            if (!isAuthenticated) {
                return e('div', { className: "min-h-screen flex items-center justify-center p-6 bg-[#050507]" },
                    e('div', { className: "w-full max-w-sm text-center" },
                        e('div', { className: "mx-auto w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mb-8 shadow-2xl shadow-blue-600/30" }, e(LockIcon)),
                        e('h1', { className: "text-2xl font-black italic uppercase tracking-tighter mb-2" }, "Vault Lock"),
                        e('p', { className: "text-slate-500 text-xs mb-8 font-bold uppercase tracking-widest" }, "Masukkan Kunci Enkripsi"),
                        e('form', { onSubmit: handleLogin, className: "space-y-4" },
                            e('input', { 
                                type: "password", 
                                placeholder: "PASSWORD",
                                value: inputPassword,
                                onChange: (ev) => setInputPassword(ev.target.value),
                                className: "w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-blue-500 text-center tracking-[0.5em] text-white"
                            }),
                            error && e('p', { className: "text-rose-500 text-[10px] font-black uppercase" }, error),
                            e('button', { type: "submit", className: "w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl font-black uppercase text-xs tracking-widest transition-all" }, "Dekripsi Akses")
                        )
                    )
                );
            }

            return e('div', { className: "min-h-screen p-8" },
                e('div', { className: "max-w-4xl mx-auto" },
                    e('h1', { className: "text-4xl font-black italic uppercase" }, "Dashboard"),
                    e('p', { className: "text-slate-500 mt-2" }, "Sistem berhasil dimuat. Selamat datang kembali.")
                )
            );
        };

        // Render manual tanpa Babel JSX
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
